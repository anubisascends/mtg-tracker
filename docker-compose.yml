services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=MtgTracker
      - Jwt__Audience=MtgTracker
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/mtg.db
      - AdminSeed__Email=${ADMIN_EMAIL}
      - AdminSeed__Password=${ADMIN_PASSWORD}
      - AdminSeed__Username=${ADMIN_USERNAME:-admin}
      - SeedSampleData=${SEED_SAMPLE_DATA:-false}
      - Smtp__Host=${SMTP_HOST:-}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__From=${SMTP_FROM:-}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__EnableSsl=${SMTP_ENABLE_SSL:-true}
    volumes:
      - mtg-data:/app/data
    networks:
      - mtg-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5002:80"
    depends_on:
      - backend
    networks:
      - mtg-net
    restart: unless-stopped

volumes:
  mtg-data:

networks:
  mtg-net:
